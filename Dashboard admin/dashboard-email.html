<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Example</title>
    <link rel="stylesheet" href="dashboard-emai.css">
</head>
<body>
    <!-- Кнопка для открытия панели -->
    <button id="openButton">Нажми</button>

    <!-- Затемнённый фон -->
    <div id="overlay" class="overlay"></div>

    <!-- Всплывающая панель -->
    <div id="popupPanel" class="popup">
        <h2>Иди Нахуй</h2>
        <p>Долбаеб.</p>
        <button id="closeButton">Закрыть</button>
    </div>

    <script src="dashboard-edit_panel.js"></script>
</body>
</html>
